/* ===== NutriTEC — Vista Administrador — Tema turquesa agua / blanco / gris claro ===== */
:root{

  --nt-teal-800:#0E5E57;
  --nt-teal-700:#0F766E;
  --nt-teal-600:#0D9488;
  --nt-teal-500:#14B8A6;
  --nt-teal-400:#2DD4BF;
  --nt-teal-300:#5EEAD4;
  --nt-teal-100:#CCFBF1;
  --nt-teal-50:#F0FDFA;

  --nt-ink:#13211F;
  --nt-muted:#6B7B79;
  --nt-line:#E6EAEA;
  --nt-bg:#F4F6F6;
  --nt-card:#FFFFFF;

  --nt-danger:#BB4A3F;
  --nt-danger-bg:#F8EAE8;
  --nt-danger-line:#ECD2CE;

  /* Bootstrap overrides */
  --bs-primary:#0D9488;
  --bs-primary-rgb:13,148,136;
  --bs-body-color:#13211F;
  --bs-body-font-family:'Manrope',system-ui,sans-serif;
  --bs-border-color:#E6EAEA;
  --bs-link-color:#0F766E;
  --bs-link-hover-color:#0B4F49;
}

*{ -webkit-font-smoothing:antialiased; }
html,body{ height:100%; }
body{
  margin:0;
  font-family:'Manrope',system-ui,sans-serif;
  color:var(--nt-ink);
  background:var(--nt-bg);
}
h1,h2,h3,h4,h5,h6,.h1,.h2,.h3,.h4,.h5{

  letter-spacing:-0.015em;
  font-weight:700;
}
.text-muted-soft{ color:var(--nt-muted)!important; }
.fw-800{ font-weight:800; }
.fw-700{ font-weight:700; }
.fw-600{ font-weight:600; }
.min-w-0{ min-width:0; }
.mono{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; }

/* ---- Buttons ---- */
.btn{ border-radius:10px; font-weight:600; font-family:'Manrope',sans-serif; display:inline-flex; align-items:center; justify-content:center; gap:.4rem; }
.btn-lg{ border-radius:12px; }
.btn-primary{ --bs-btn-bg:var(--nt-teal-600); --bs-btn-border-color:var(--nt-teal-600);
  --bs-btn-hover-bg:var(--nt-teal-700); --bs-btn-hover-border-color:var(--nt-teal-700);
  --bs-btn-active-bg:var(--nt-teal-800); --bs-btn-active-border-color:var(--nt-teal-800);
  --bs-btn-disabled-bg:var(--nt-teal-600); --bs-btn-disabled-border-color:var(--nt-teal-600); }
.btn-outline-primary{ --bs-btn-color:var(--nt-teal-700); --bs-btn-border-color:var(--nt-teal-300);
  --bs-btn-hover-bg:var(--nt-teal-50); --bs-btn-hover-color:var(--nt-teal-700); --bs-btn-hover-border-color:var(--nt-teal-500);
  --bs-btn-active-bg:var(--nt-teal-100); --bs-btn-active-color:var(--nt-teal-900); --bs-btn-active-border-color:var(--nt-teal-500); }
.btn-soft{ background:var(--nt-teal-50); color:var(--nt-teal-700); border:1px solid var(--nt-teal-100); }
.btn-soft:hover{ background:var(--nt-teal-100); color:var(--nt-teal-900); }
.btn-danger-soft{ background:var(--nt-danger-bg); color:var(--nt-danger); border:1px solid var(--nt-danger-line); }
.btn-danger-soft:hover{ background:#F2DCD8; color:#9B3B31; }

/* ---- Links / accents ---- */
.text-teal{ color:var(--nt-teal-700)!important; }
.text-danger-soft{ color:var(--nt-danger)!important; }
.bg-teal-50{ background:var(--nt-teal-50)!important; }

/* ---- Cards ---- */
.nt-card{
  background:var(--nt-card);
  border:1px solid var(--nt-line);
  border-radius:16px;
}
.nt-card-pad{ padding:1.5rem; }

/* ---- Form controls ---- */
.form-control,.form-select{
  border-radius:10px; border:1px solid var(--nt-line); padding:.6rem .85rem;
  background:#fff; font-size:.95rem;
}
.form-control:focus,.form-select:focus{

}
.form-label{ font-weight:600; font-size:.85rem; color:var(--nt-ink); margin-bottom:.35rem; }
.input-group-text{ background:var(--nt-teal-50); border-color:var(--nt-line); color:var(--nt-teal-700); border-radius:10px; }

/* ---- Badges / pills ---- */
.nt-pill{ display:inline-flex; align-items:center; gap:.35rem; font-weight:600; font-size:.78rem;

.nt-pill-teal{ background:var(--nt-teal-100); color:var(--nt-teal-900); }
.nt-pill-gray{ background:#EEF1F1; color:var(--nt-muted); }
.nt-pill-red{ background:var(--nt-danger-bg); color:var(--nt-danger); }

.nt-app{ display:flex; min-height:100vh; }
.nt-sidebar{

.nt-brand{ display:flex; align-items:center; gap:.6rem; padding:1.4rem 1.4rem 1rem; }

.nt-auth-brand .nt-brand-mark{ width:48px; height:48px; }
.nt-brand-name{ font-weight:800; font-size:1.2rem; color:var(--nt-ink); line-height:1; letter-spacing:-.02em; }
.nt-brand-name span{ color:var(--nt-teal-600); }
.nt-brand-role{ font-size:.66rem; color:var(--nt-muted); font-weight:700; letter-spacing:.1em; text-transform:uppercase; margin-top:.25rem; }
.nt-nav{ padding:.5rem .75rem; flex:1; overflow-y:auto; }
.nt-nav-label{ font-size:.7rem; text-transform:uppercase; letter-spacing:.09em; color:var(--nt-muted);
  padding:1rem .85rem .4rem; font-weight:700; }
.nt-nav-item{ display:flex; align-items:center; gap:.7rem; padding:.65rem .85rem; border-radius:10px;

.nt-nav-item:hover{ background:var(--nt-teal-50); color:var(--nt-teal-800); }
.nt-nav-item.active{ background:var(--nt-teal-50); color:var(--nt-teal-800); box-shadow:inset 3px 0 0 var(--nt-teal-500); }
.nt-nav-item .ico{ width:20px; text-align:center; display:grid; place-items:center; }
.nt-nav-badge{ margin-left:auto; background:var(--nt-teal-600); color:#fff; font-size:.7rem; font-weight:800;

.nt-side-user{ padding:1rem; border-top:1px solid var(--nt-line); display:flex; align-items:center; gap:.7rem; }
.nt-avatar{ width:38px; height:38px; border-radius:50%; background:var(--nt-teal-100); color:var(--nt-teal-800);

.nt-main{ flex:1; min-width:0; display:flex; flex-direction:column; }
.nt-topbar{ background:#fff; border-bottom:1px solid var(--nt-line); padding:1rem 1.75rem;

.nt-topbar h1{ font-size:1.3rem; margin:0; font-weight:800; letter-spacing:-.02em; }
.nt-content{ padding:1.75rem; max-width:1240px; width:100%; }

.nt-seg{ display:inline-flex; padding:4px; background:var(--nt-teal-50); border:1px solid var(--nt-teal-100); border-radius:12px; gap:4px; }
.nt-seg button{ border:none; background:none; border-radius:9px; padding:.45rem 1rem; font-weight:600; font-size:.9rem; color:var(--nt-muted); cursor:pointer; display:inline-flex; align-items:center; gap:.4rem; white-space:nowrap; }

.table{ --bs-table-color:var(--nt-ink); }

.table td,.table th{ padding:.7rem .75rem; vertical-align:middle; }

/* ---- Producto pendiente ---- */
.nt-prod{ border:1px solid var(--nt-line); border-radius:14px; overflow:hidden; background:#fff; }
.nt-prod-head{ display:flex; align-items:center; gap:.9rem; padding:1rem 1.15rem; }

.nt-nutri-cell{ background:var(--nt-teal-50); border:1px solid var(--nt-line); border-radius:10px; padding:.5rem .7rem; }

.nt-divider{ height:1px; background:var(--nt-line); margin:1.25rem 0; }
.cursor-pointer{ cursor:pointer; }
.nt-chip{ display:inline-flex; align-items:center; gap:.4rem; background:var(--nt-teal-50);

.nt-empty{ border:1.5px dashed var(--nt-line); border-radius:14px; padding:2rem; text-align:center; color:var(--nt-muted); }

/* ---- Modal ---- */
.nt-modal-backdrop{ position:fixed; inset:0; z-index:1080; background:rgba(13,40,36,.4);

.nt-modal-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:1rem;

.nt-modal-x{ border:none; background:var(--nt-teal-50); color:var(--nt-muted); width:34px; height:34px;

.nt-modal-x:hover{ background:var(--nt-teal-100); color:var(--nt-ink); }
.nt-modal-body{ padding:1.5rem; }
.nt-modal-foot{ padding:1rem 1.5rem; border-top:1px solid var(--nt-line); display:flex; justify-content:flex-end; gap:.6rem; }

/* ---- Toast ---- */
.nt-toast{ position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); z-index:1090;

.nt-toast svg{ color:#fff; }
.nt-toast.warn{ background:var(--nt-danger); }

@media (max-width:991px){
  .nt-sidebar{ position:fixed; left:0; z-index:1050; transform:translateX(-100%); transition:transform .25s; }
  .nt-sidebar.open{ transform:none; }
  .nt-content{ padding:1.1rem; }

@media print {

  *, *::before, *::after{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; box-shadow:none !important; }
  .nt-sidebar, .nt-topbar, .d-print-none { display: none !important; }
  .nt-content { padding: 0 !important; max-width: 100% !important; }
  body { background: #fff !important; }
  .nt-card { border: 1px solid #ccc !important; }
  .print-only{ display:block !important; }
  table, tr, .nt-card{ break-inside:avoid; }
}
.print-only{ display:none; }

    user: <><circle cx="12" cy="8" r="4" /><path d="M4 21a8 8 0 0 1 16 0" /></>,

    coins: <><ellipse cx="9" cy="7" rx="6" ry="3" /><path d="M3 7v5c0 1.7 2.7 3 6 3s6-1.3 6-3V7" /><path d="M9 12c0 1.7 2.7 3 6 3s6-1.3 6-3" /><path d="M15 9.5c0 1.7 2.7 3 6 3" /></>,
    db: <><ellipse cx="12" cy="6" rx="8" ry="3" /><path d="M4 6v6c0 1.7 3.6 3 8 3s8-1.3 8-3V6" /><path d="M4 12v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6" /></>,
    arrow: <><path d="M5 12h14M13 6l6 6-6 6" /></>,
    info: <><circle cx="12" cy="12" r="9" /><path d="M12 11v5M12 8h.01" /></>,
  };
  return <svg {...common}>{paths[name] || null}</svg>;
}

const NT_MESES = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
const NT_MESES_C = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
function ntParse(s) {
  if (!s) return null;
  const [y, m, d] = String(s).split("-").map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
}
function ntFmt(s) {
  const d = ntParse(s);
  if (!d) return null;
  return `${d.getDate()} ${NT_MESES_C[d.getMonth()]} ${d.getFullYear()}`;
}

function Modal({ title, sub, onClose, children, footer, size = "md" }) {
  React.useEffect(() => {
    function onKey(e) { if (e.key === "Escape") onClose(); }
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);
  const maxW = size === "lg" ? 720 : size === "sm" ? 420 : 560;
  return (
    <div className="nt-modal-backdrop" onMouseDown={onClose}>
      <div className="nt-modal" style={{ maxWidth: maxW }} onMouseDown={(e) => e.stopPropagation()}>
        <div className="nt-modal-head">
          <div>
            <h3 className="h5 fw-800 mb-0">{title}</h3>
            {sub && <div className="text-muted-soft" style={{ fontSize: ".88rem" }}>{sub}</div>}
          </div>
          <button className="nt-modal-x" onClick={onClose} aria-label="Cerrar">×</button>
        </div>
        <div className="nt-modal-body">{children}</div>
        {footer && <div className="nt-modal-foot">{footer}</div>}
      </div>
    </div>
  );
}

  </script>

  <script type="text/babel">
/* ===== productos.jsx ===== */

function NutriCell({ k, v, u }) {
  return (
    <div className="nt-nutri-cell">
      <div className="k">{k}</div>
      <div className="v">{v}<span className="text-muted-soft fw-700" style={{ fontSize: ".78rem" }}>{u ? " " + u : ""}</span></div>
    </div>
  );
}

function EstadoPill({ estado }) {
  if (estado === "Aprobado") return <Pill tone="teal"><Icon name="check" size={13} /> Aprobado</Pill>;
  if (estado === "Rechazado") return <Pill tone="red"><Icon name="x" size={13} /> Rechazado</Pill>;
  return <Pill tone="gray"><Icon name="clock" size={13} /> Pendiente</Pill>;
}

function ProductCard({ p, onApprove, onReject, onDetail }) {
  return (
    <div className="nt-prod h-100 d-flex flex-column">
      <div className="nt-prod-head">
        <div className="nt-prod-ico"><Icon name="box" size={22} /></div>
        <div className="flex-fill min-w-0">
          <div className="fw-800 text-truncate" style={{ fontSize: "1.02rem" }}>{p.desc}</div>
          <div className="text-muted-soft d-flex align-items-center gap-2 flex-wrap" style={{ fontSize: ".8rem" }}>
            <span><Icon name="barcode" size={13} /> {p.barcode}</span>
            <span>·</span>
            <span>{p.porcion}{p.unidad}</span>
          </div>
        </div>
        <EstadoPill estado={p.estado} />
      </div>

      <div className="px-3 pb-2 d-flex flex-wrap gap-2">
        <span className="nt-chip"><Icon name={p.autorTipo === "Nutricionista" ? "users" : "user"} size={13} /> {p.autorTipo}: {p.autor}</span>
        <span className="nt-chip"><Icon name="cal" size={13} /> {window.ntFmt(p.fecha)}</span>
      </div>

      <div className="nt-nutri-grid">
        <NutriCell k="Energía" v={p.energia} u="kcal" />
        <NutriCell k="Grasa" v={p.grasa} u="g" />
        <NutriCell k="Sodio" v={p.sodio} u="mg" />
        <NutriCell k="Carbos" v={p.carbs} u="g" />
        <NutriCell k="Proteína" v={p.proteina} u="g" />
        <NutriCell k="Calcio" v={p.calcio} u="mg" />
        <NutriCell k="Hierro" v={p.hierro} u="mg" />
        <NutriCell k="Vitaminas" v={p.vitaminas} />
      </div>

      {p.estado === "Rechazado" && p.motivo && (
        <div className="px-3 pb-2"><div className="nt-note" style={{ background: "var(--nt-danger-bg)", borderColor: "var(--nt-danger-line)", color: "var(--nt-danger)" }}><Icon name="info" size={15} /> Motivo: {p.motivo}</div></div>
      )}

      <div className="mt-auto px-3 pb-3 pt-1 d-flex gap-2">
        <button className="btn btn-soft btn-sm" onClick={() => onDetail(p)}><Icon name="search" size={14} /> Detalle</button>
        {p.estado === "Pendiente" ? (
          <>
            <button className="btn btn-danger-soft btn-sm flex-fill" onClick={() => onReject(p)}><Icon name="x" size={15} /> Rechazar</button>
            <button className="btn btn-primary btn-sm flex-fill" onClick={() => onApprove(p)}><Icon name="check" size={15} /> Aprobar</button>
          </>
        ) : (
          <span className="text-muted-soft ms-auto align-self-center" style={{ fontSize: ".8rem" }}>Revisado</span>
        )}
      </div>
    </div>
  );
}

function RejectModal({ titulo, nombre, onClose, onConfirm }) {
  const [motivo, setMotivo] = React.useState("");
  return (
    <Modal title={titulo} sub={nombre} onClose={onClose}
      footer={<>
        <button className="btn btn-soft" onClick={onClose}>Cancelar</button>
        <button className="btn btn-danger-soft" onClick={() => onConfirm(motivo)} disabled={!motivo.trim()}><Icon name="x" size={15} /> Confirmar rechazo</button>
      </>}>
      <p className="text-muted-soft mb-3">No quedará disponible para la comunidad. Indica el motivo del rechazo (se notificará a quien lo envió).</p>
      <label className="form-label">Motivo del rechazo</label>
      <textarea className="form-control" rows={3} value={motivo} onChange={(e) => setMotivo(e.target.value)} placeholder="Ej. Los datos nutricionales no son verificables…" autoFocus></textarea>
    </Modal>
  );
}

function DetailModal({ producto, onClose }) {
  const p = producto;
  return (
    <Modal title={p.desc} sub={`Código ${p.barcode} · porción ${p.porcion}${p.unidad}`} onClose={onClose} size="lg"
      footer={<button className="btn btn-primary" onClick={onClose}>Cerrar</button>}>
      <div className="d-flex flex-wrap gap-2 mb-3">
        <span className="nt-chip"><Icon name={p.autorTipo === "Nutricionista" ? "users" : "user"} size={13} /> {p.autorTipo}: {p.autor}</span>
        <span className="nt-chip"><Icon name="cal" size={13} /> Enviado el {window.ntFmt(p.fecha)}</span>
      </div>
      <div className="nt-nutri-grid" style={{ padding: 0 }}>
        <NutriCell k="Energía" v={p.energia} u="kcal" />
        <NutriCell k="Grasa" v={p.grasa} u="g" />
        <NutriCell k="Sodio" v={p.sodio} u="mg" />
        <NutriCell k="Carbohidratos" v={p.carbs} u="g" />
        <NutriCell k="Proteína" v={p.proteina} u="g" />
        <NutriCell k="Calcio" v={p.calcio} u="mg" />
        <NutriCell k="Hierro" v={p.hierro} u="mg" />
        <NutriCell k="Vitaminas" v={p.vitaminas} />
      </div>
    </Modal>
  );
}

function Products() {
  const D = window.NT_DATA;
  const [prods, setProds] = React.useState(() => D.productos.map((p) => ({ ...p })));
  const [filtro, setFiltro] = React.useState("Pendiente");
  const [autorFiltro, setAutorFiltro] = React.useState("Todos");
  const [q, setQ] = React.useState("");
  const [rejecting, setRejecting] = React.useState(null);
  const [detail, setDetail] = React.useState(null);
  const [toast, setToast] = React.useState(null);

  function flash(msg, warn) { setToast({ msg, warn }); setTimeout(() => setToast(null), 2600); }

  function aprobar(p) {
    setProds((prev) => prev.map((x) => x.id === p.id ? { ...x, estado: "Aprobado", motivo: undefined } : x));
    flash(`«${p.desc}» aprobado y publicado a la comunidad`);
  }
  function rechazar(motivo) {
    const p = rejecting;
    setProds((prev) => prev.map((x) => x.id === p.id ? { ...x, estado: "Rechazado", motivo } : x));
    setRejecting(null);
    flash(`«${p.desc}» fue rechazado`, true);
  }

  const counts = {
    Pendiente: prods.filter((p) => p.estado === "Pendiente").length,
    Aprobado: prods.filter((p) => p.estado === "Aprobado").length,
    Rechazado: prods.filter((p) => p.estado === "Rechazado").length,
    Todos: prods.length,
  };

  const lista = prods.filter((p) => {
    if (filtro !== "Todos" && p.estado !== filtro) return false;
    if (autorFiltro !== "Todos" && p.autorTipo !== autorFiltro) return false;
    const t = q.trim().toLowerCase();
    if (t && !(p.desc.toLowerCase().includes(t) || p.barcode.includes(t) || p.autor.toLowerCase().includes(t))) return false;
    return true;
  });

  const tabs = [["Pendiente", "Pendientes"], ["Aprobado", "Aprobados"], ["Rechazado", "Rechazados"], ["Todos", "Todos"]];

  return (
    <div className="nt-content">
      <div className="d-flex flex-wrap gap-3 align-items-center justify-content-between mb-3">
        <div className="nt-seg">
          {tabs.map(([k, l]) => (
            <button key={k} className={filtro === k ? "on" : ""} onClick={() => setFiltro(k)}>
              {l} <span className="cnt">{counts[k]}</span>
            </button>
          ))}
        </div>
        <div className="d-flex gap-2 flex-wrap">
          <select className="form-select" style={{ width: 180 }} value={autorFiltro} onChange={(e) => setAutorFiltro(e.target.value)}>
            <option value="Todos">Todos los autores</option>
            <option value="Cliente">Clientes</option>
            <option value="Nutricionista">Nutricionistas</option>
          </select>
          <div className="input-group" style={{ width: 260 }}>
            <span className="input-group-text"><Icon name="search" size={16} /></span>
            <input className="form-control" placeholder="Buscar producto o código…" value={q} onChange={(e) => setQ(e.target.value)} />
          </div>
        </div>
      </div>

      {lista.length === 0 ? (
        <div className="nt-empty"><Icon name="box" size={28} /><div className="mt-2 fw-700">No hay productos en esta vista</div><div style={{ fontSize: ".88rem" }}>Ajusta los filtros o la búsqueda.</div></div>
      ) : (
        <div className="row g-3">
          {lista.map((p) => (
            <div className="col-md-6 col-xl-4" key={p.id}>
              <ProductCard p={p} onApprove={aprobar} onReject={setRejecting} onDetail={setDetail} />
            </div>
          ))}
        </div>
      )}

      {rejecting && <RejectModal titulo="Rechazar producto" nombre={rejecting.desc} onClose={() => setRejecting(null)} onConfirm={rechazar} />}
      {detail && <DetailModal producto={detail} onClose={() => setDetail(null)} />}
      {toast && <div className={"nt-toast" + (toast.warn ? " warn" : "")}><Icon name={toast.warn ? "x" : "check"} size={16} /> {toast.msg}</div>}
    </div>
  );
}

Object.assign(window, { Products, ProductCard, RejectModal, DetailModal, NutriCell, EstadoPill });
  </script>

  <script type="text/babel">
/* ===== cobro.jsx ===== */

function fmtUSD(n) { return "$" + n.toFixed(2); }

function CobroGroup({ tipo, nutris, regla }) {
  const D = window.NT_DATA;
  const filas = nutris.map((n) => ({ n, c: D.calcularCobro(n) }));
  const sub = filas.reduce((a, f) => ({
    pacientes: a.pacientes + f.n.pacientes,
    bruto: a.bruto + f.c.bruto,
    descuento: a.descuento + f.c.descuento,
    total: a.total + f.c.total,
  }), { pacientes: 0, bruto: 0, descuento: 0, total: 0 });

  return (
    <>
      <tr className="nt-table-group">
        <th colSpan={7}>
          <div className="d-flex align-items-center gap-2 py-1">
            <Icon name="coins" size={16} /> Tipo de pago: {tipo}
            <span className="text-muted-soft fw-600" style={{ fontSize: ".82rem" }}>· {regla.detalle}</span>
            <span className="nt-pill nt-pill-gray ms-auto">{nutris.length} nutricionistas</span>
          </div>
        </th>
      </tr>
      {filas.map(({ n, c }) => (
        <tr key={n.id}>
          <td className="fw-600">{n.email}</td>
          <td className="fw-700">{n.nombre}</td>
          <td className="mono text-muted-soft">{n.tarjeta}</td>
          <td className="text-center mono">{n.pacientes}</td>
          <td className="text-end mono">{fmtUSD(c.bruto)}</td>
          <td className="text-end mono text-danger-soft">{c.descuento > 0 ? "−" + fmtUSD(c.descuento) : "—"}</td>
          <td className="text-end mono fw-800">{fmtUSD(c.total)}</td>
        </tr>
      ))}
      <tr className="nt-table-sub">
        <td colSpan={3} className="text-end">Subtotal {tipo}</td>
        <td className="text-center mono">{sub.pacientes}</td>
        <td className="text-end mono">{fmtUSD(sub.bruto)}</td>
        <td className="text-end mono text-danger-soft">{sub.descuento > 0 ? "−" + fmtUSD(sub.descuento) : "—"}</td>
        <td className="text-end mono text-teal">{fmtUSD(sub.total)}</td>
      </tr>
    </>
  );
}

function Cobro() {
  return (
    <div className="nt-content">
      <div className="nt-card nt-card-pad d-flex flex-column align-items-center justify-content-center text-center" style={{ minHeight: "60vh", gap: "1.25rem" }}>
        <div className="d-flex align-items-center justify-content-center" style={{ width: 80, height: 80, borderRadius: "50%", background: "var(--nt-teal-50, #e6f4f1)" }}>
          <Icon name="card" size={34} />
        </div>
        <div>
          <h2 className="h4 fw-800 mb-2">Reporte de cobro</h2>
          <p className="text-muted-soft mb-0" style={{ maxWidth: 420 }}>
            Esta sección se encuentra en desarrollo. Pronto estará disponible.
          </p>
        </div>
        <span className="nt-pill nt-pill-gray">En desarrollo</span>
      </div>
    </div>
  );
}

Object.assign(window, { Cobro, CobroGroup, fmtUSD });
  </script>

  <script type="text/babel">
/* ===== app.jsx ===== */

const TITLES = {
  productos: ["Aprobación de productos", "Verifica y aprueba los productos de la comunidad"],
  cobro: ["Reporte de cobro", "Sección en desarrollo"],
};

function App() {
  const [view, setView] = React.useState("login");
  const [screen, setScreen] = React.useState("productos");
  const [menuOpen, setMenuOpen] = React.useState(false);

  const D = window.NT_DATA;
  const badges = {
    prod: D.productos.filter((p) => p.estado === "Pendiente").length,
  };

  if (view === "login") return <Login onLogin={() => { setScreen("productos"); setView("app"); }} />;

  const nav = (k) => { setScreen(k); setMenuOpen(false); };
  const [title, sub] = TITLES[screen];

  let body = null;
  if (screen === "productos") body = <Products />;
  else if (screen === "cobro") body = <Cobro />;

  return (
    <div className="nt-app">
      <Sidebar current={screen} onNav={nav} onLogout={() => setView("login")} open={menuOpen} badges={badges} />
      {menuOpen && <div className="position-fixed top-0 start-0 w-100 h-100 d-lg-none" style={{ background: "rgba(0,0,0,.3)", zIndex: 1040 }} onClick={() => setMenuOpen(false)}></div>}
      <main className="nt-main">
        <TopBar title={title} subtitle={sub} onMenu={() => setMenuOpen(true)} />
        {body}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
