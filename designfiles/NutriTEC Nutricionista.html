<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriTEC · Vista Nutricionista</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
/* ===== NutriTEC — Vista Nutricionista — Tema turquesa agua / blanco / gris claro ===== */
:root{
  --nt-teal-900:#0B4F49;
  --nt-teal-800:#0E5E57;
  --nt-teal-700:#0F766E;
  --nt-teal-600:#0D9488;
  --nt-teal-500:#14B8A6;
  --nt-teal-400:#2DD4BF;
  --nt-teal-300:#5EEAD4;
  --nt-teal-100:#CCFBF1;
  --nt-teal-50:#F0FDFA;

  --nt-ink:#13211F;
  --nt-muted:#6B7B79;
  --nt-line:#E6EAEA;
  --nt-bg:#F4F6F6;
  --nt-card:#FFFFFF;

  --nt-danger:#BB4A3F;
  --nt-danger-bg:#F8EAE8;
  --nt-danger-line:#ECD2CE;

  /* Bootstrap overrides */
  --bs-primary:#0D9488;
  --bs-primary-rgb:13,148,136;
  --bs-body-color:#13211F;
  --bs-body-font-family:'Manrope',system-ui,sans-serif;
  --bs-border-color:#E6EAEA;
  --bs-link-color:#0F766E;
  --bs-link-hover-color:#0B4F49;
}

*{ -webkit-font-smoothing:antialiased; }
html,body{ height:100%; }
body{
  margin:0;
  font-family:'Manrope',system-ui,sans-serif;
  color:var(--nt-ink);
  background:var(--nt-bg);
}
h1,h2,h3,h4,h5,h6,.h1,.h2,.h3,.h4,.h5{
  font-family:'Manrope',system-ui,sans-serif;
  letter-spacing:-0.015em;
  font-weight:700;
}
.text-muted-soft{ color:var(--nt-muted)!important; }
.fw-800{ font-weight:800; }
.fw-700{ font-weight:700; }
.fw-600{ font-weight:600; }
.min-w-0{ min-width:0; }

/* ---- Buttons ---- */
.btn{ border-radius:10px; font-weight:600; font-family:'Manrope',sans-serif; display:inline-flex; align-items:center; justify-content:center; gap:.4rem; }
.btn-lg{ border-radius:12px; }
.btn-primary{ --bs-btn-bg:var(--nt-teal-600); --bs-btn-border-color:var(--nt-teal-600);
  --bs-btn-hover-bg:var(--nt-teal-700); --bs-btn-hover-border-color:var(--nt-teal-700);
  --bs-btn-active-bg:var(--nt-teal-800); --bs-btn-active-border-color:var(--nt-teal-800);
  --bs-btn-disabled-bg:var(--nt-teal-600); --bs-btn-disabled-border-color:var(--nt-teal-600); }
.btn-outline-primary{ --bs-btn-color:var(--nt-teal-700); --bs-btn-border-color:var(--nt-teal-300);
  --bs-btn-hover-bg:var(--nt-teal-50); --bs-btn-hover-color:var(--nt-teal-700); --bs-btn-hover-border-color:var(--nt-teal-500);
  --bs-btn-active-bg:var(--nt-teal-100); --bs-btn-active-color:var(--nt-teal-900); --bs-btn-active-border-color:var(--nt-teal-500); }
.btn-soft{ background:var(--nt-teal-50); color:var(--nt-teal-700); border:1px solid var(--nt-teal-100); }
.btn-soft:hover{ background:var(--nt-teal-100); color:var(--nt-teal-900); }
.btn-danger-soft{ background:var(--nt-danger-bg); color:var(--nt-danger); border:1px solid var(--nt-danger-line); }
.btn-danger-soft:hover{ background:#F2DCD8; color:#9B3B31; }

/* ---- Links / accents ---- */
.text-teal{ color:var(--nt-teal-700)!important; }
.text-danger-soft{ color:var(--nt-danger)!important; }
.bg-teal-50{ background:var(--nt-teal-50)!important; }
.bg-teal-100{ background:var(--nt-teal-100)!important; }

/* ---- Cards ---- */
.nt-card{
  background:var(--nt-card);
  border:1px solid var(--nt-line);
  border-radius:16px;
}
.nt-card-pad{ padding:1.5rem; }

/* ---- Form controls ---- */
.form-control,.form-select{
  border-radius:10px; border:1px solid var(--nt-line); padding:.6rem .85rem;
  background:#fff; font-size:.95rem;
}
.form-control:focus,.form-select:focus{
  border-color:var(--nt-teal-500); box-shadow:0 0 0 .2rem rgba(20,184,166,.15);
}
.form-control-sm,.input-group-sm .form-control,.input-group-sm .form-select{ padding:.3rem .5rem; font-size:.85rem; }
.form-label{ font-weight:600; font-size:.85rem; color:var(--nt-ink); margin-bottom:.35rem; }
.input-group-text{ background:var(--nt-teal-50); border-color:var(--nt-line); color:var(--nt-teal-700); border-radius:10px; }

/* ---- Date picker propio ---- */
.nt-dp{ position:relative; width:100%; }
.nt-dp-trigger{ cursor:pointer; font-weight:600; color:var(--nt-ink); flex:1 1 auto; min-width:0; text-align:left; gap:.5rem; }
.nt-dp-trigger > span{ flex:1 1 auto; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.nt-dp-trigger.focus{ border-color:var(--nt-teal-500); box-shadow:0 0 0 .2rem rgba(20,184,166,.15); }
.nt-dp-trigger svg{ color:var(--nt-teal-700); flex:0 0 auto; }
.nt-dp-pop{ position:absolute; z-index:60; top:calc(100% + 8px); left:0; width:288px; max-width:90vw; background:#fff;
  border:1px solid var(--nt-line); border-radius:14px; box-shadow:0 18px 44px rgba(13,40,36,.14); padding:.85rem; }
.nt-dp-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:.6rem; }
.nt-dp-title{ font-weight:700; font-size:.95rem; text-transform:capitalize; }
.nt-dp-nav{ width:32px; height:32px; border-radius:9px; border:1px solid var(--nt-line); background:#fff;
  font-size:1.2rem; line-height:1; color:var(--nt-teal-700); display:grid; place-items:center; cursor:pointer; }
.nt-dp-nav:hover{ background:var(--nt-teal-50); border-color:var(--nt-teal-300); }
.nt-dp-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.nt-dp-dow{ margin-bottom:.25rem; }
.nt-dp-dowcell{ text-align:center; font-size:.72rem; font-weight:700; color:var(--nt-muted); padding:.2rem 0; }
.nt-dp-day{ aspect-ratio:1; border:none; background:none; border-radius:9px; font-weight:600; font-size:.86rem;
  color:var(--nt-ink); cursor:pointer; display:grid; place-items:center; padding:0; }
.nt-dp-day:hover{ background:var(--nt-teal-50); }
.nt-dp-day.today{ color:var(--nt-teal-700); box-shadow:inset 0 0 0 1.6px var(--nt-teal-400); }
.nt-dp-day.sel{ background:var(--nt-teal-600); color:#fff; }
.nt-dp-day.sel:hover{ background:var(--nt-teal-700); }
.nt-dp-foot{ margin-top:.6rem; padding-top:.6rem; border-top:1px solid var(--nt-line); }
.nt-dp-todaybtn{ width:100%; border:none; background:var(--nt-teal-50); color:var(--nt-teal-700);
  border-radius:10px; padding:.5rem; font-weight:700; font-size:.82rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:.4rem; }
.nt-dp-todaybtn:hover{ background:var(--nt-teal-100); }

/* ---- Badges / pills ---- */
.nt-pill{ display:inline-flex; align-items:center; gap:.35rem; font-weight:600; font-size:.78rem;
  padding:.3rem .7rem; border-radius:999px; white-space:nowrap; }
.nt-pill-teal{ background:var(--nt-teal-100); color:var(--nt-teal-900); }
.nt-pill-gray{ background:#EEF1F1; color:var(--nt-muted); }
.nt-pill-red{ background:var(--nt-danger-bg); color:var(--nt-danger); }

/* ---- Progress ---- */
.progress{ background:var(--nt-teal-50); border-radius:999px; height:8px; }
.progress-bar{ background:var(--nt-teal-500); }
.progress-bar.over{ background:var(--nt-danger); }

/* ============ App shell ============ */
.nt-app{ display:flex; min-height:100vh; }
.nt-sidebar{
  width:248px; flex:0 0 248px; background:#fff; color:var(--nt-ink);
  display:flex; flex-direction:column; position:sticky; top:0; height:100vh;
  border-right:1px solid var(--nt-line);
}
.nt-brand{ display:flex; align-items:center; gap:.6rem; padding:1.4rem 1.4rem 1rem; }
.nt-brand-mark{ width:38px; height:38px; border-radius:10px; object-fit:cover; display:block; background:#fff; }
.nt-auth-brand .nt-brand-mark{ width:48px; height:48px; }
.nt-brand-name{ font-weight:800; font-size:1.2rem; color:var(--nt-ink); line-height:1; letter-spacing:-.02em; }
.nt-brand-name span{ color:var(--nt-teal-600); }
.nt-brand-role{ font-size:.66rem; color:var(--nt-muted); font-weight:700; letter-spacing:.1em; text-transform:uppercase; margin-top:.25rem; }
.nt-nav{ padding:.5rem .75rem; flex:1; overflow-y:auto; }
.nt-nav-label{ font-size:.7rem; text-transform:uppercase; letter-spacing:.09em; color:var(--nt-muted);
  padding:1rem .85rem .4rem; font-weight:700; }
.nt-nav-item{ display:flex; align-items:center; gap:.7rem; padding:.65rem .85rem; border-radius:10px;
  color:var(--nt-muted); font-weight:600; cursor:pointer; font-size:.92rem; border:none; background:none; width:100%; text-align:left; }
.nt-nav-item:hover{ background:var(--nt-teal-50); color:var(--nt-teal-800); }
.nt-nav-item.active{ background:var(--nt-teal-50); color:var(--nt-teal-800); box-shadow:inset 3px 0 0 var(--nt-teal-500); }
.nt-nav-item .ico{ width:20px; text-align:center; display:grid; place-items:center; }
.nt-nav-badge{ margin-left:auto; background:var(--nt-teal-600); color:#fff; font-size:.7rem; font-weight:800;
  min-width:20px; height:20px; padding:0 .35rem; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; }
.nt-side-user{ padding:1rem; border-top:1px solid var(--nt-line); display:flex; align-items:center; gap:.7rem; }
.nt-avatar{ width:38px; height:38px; border-radius:50%; background:var(--nt-teal-100); color:var(--nt-teal-800);
  display:grid; place-items:center; font-weight:800; flex:0 0 38px; }

.nt-main{ flex:1; min-width:0; display:flex; flex-direction:column; }
.nt-topbar{ background:#fff; border-bottom:1px solid var(--nt-line); padding:1rem 1.75rem;
  display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
.nt-topbar h1{ font-size:1.3rem; margin:0; font-weight:800; letter-spacing:-.02em; }
.nt-content{ padding:1.75rem; max-width:1240px; width:100%; }

/* ---- Auth ---- */
.nt-auth{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; background:var(--nt-bg); }
.nt-auth-card{ width:100%; max-width:410px; background:#fff; border:1px solid var(--nt-line); border-radius:18px; padding:2.5rem;
  box-shadow:0 1px 2px rgba(13,40,36,.04), 0 12px 32px rgba(13,40,36,.05); }
.nt-auth-brand{ display:flex; align-items:center; justify-content:center; gap:.6rem; margin-bottom:1.75rem; }

/* ---- Segmented control ---- */
.nt-seg{ display:inline-flex; padding:4px; background:var(--nt-teal-50); border:1px solid var(--nt-teal-100); border-radius:12px; gap:4px; }
.nt-seg button{ border:none; background:none; border-radius:9px; padding:.45rem 1rem; font-weight:600; font-size:.9rem; color:var(--nt-muted); cursor:pointer; display:inline-flex; align-items:center; gap:.4rem; white-space:nowrap; }
.nt-seg button.on{ background:var(--nt-teal-600); color:#fff; }
.nt-seg button .cnt{ background:rgba(0,0,0,.06); border-radius:999px; padding:0 .4rem; font-size:.74rem; }
.nt-seg button.on .cnt{ background:rgba(255,255,255,.22); }
@media (max-width:560px){ .nt-seg{ display:flex; width:100%; } .nt-seg button{ flex:1; justify-content:center; } }

/* ---- Meal cards ---- */
.nt-meal{ border:1px solid var(--nt-line); border-radius:14px; overflow:hidden; background:#fff; }
.nt-meal-head{ display:flex; align-items:center; justify-content:space-between; padding:.8rem 1.1rem;
  background:var(--nt-teal-50); border-bottom:1px solid var(--nt-line); }
.nt-meal-ico{ width:32px; height:32px; border-radius:9px; display:grid; place-items:center;
  background:#fff; border:1px solid var(--nt-line); color:var(--nt-teal-700); flex:0 0 32px; }
.nt-food-row{ display:flex; align-items:center; justify-content:space-between; padding:.6rem 1.1rem;
  border-bottom:1px solid var(--nt-line); }
.nt-food-row:last-child{ border-bottom:none; }

/* ---- Tables ---- */
.table{ --bs-table-color:var(--nt-ink); }
.table thead th{ font-size:.76rem; text-transform:uppercase; letter-spacing:.04em; color:var(--nt-muted);
  font-weight:700; border-bottom:1.5px solid var(--nt-line); }
.table td,.table th{ padding:.7rem .75rem; vertical-align:middle; }

/* ---- Stepper (register) ---- */
.nt-steps{ display:flex; gap:.5rem; }
.nt-step{ flex:1; height:5px; border-radius:999px; background:var(--nt-teal-100); }
.nt-step.done{ background:var(--nt-teal-500); }
.nt-step.active{ background:var(--nt-teal-600); }

/* ---- Photo upload ---- */
.nt-photo-slot{ width:72px; height:72px; flex:0 0 72px; border-radius:50%; background:var(--nt-teal-50);
  border:2px dashed var(--nt-teal-300); color:var(--nt-teal-500); display:grid; place-items:center; }

/* ---- Cobro options (radio cards) ---- */
.nt-cobro-opt{ display:flex; align-items:center; gap:.85rem; width:100%; text-align:left; cursor:pointer;
  background:#fff; border:1.5px solid var(--nt-line); border-radius:12px; padding:.85rem 1rem; }
.nt-cobro-opt:hover{ border-color:var(--nt-teal-300); background:var(--nt-teal-50); }
.nt-cobro-opt.active{ border-color:var(--nt-teal-500); background:var(--nt-teal-50); box-shadow:0 0 0 3px rgba(20,184,166,.12); }
.nt-radio{ width:22px; height:22px; flex:0 0 22px; border-radius:50%; border:2px solid var(--nt-line);
  display:grid; place-items:center; color:#fff; background:#fff; }
.nt-radio.on{ background:var(--nt-teal-500); border-color:var(--nt-teal-500); }
.nt-note{ display:flex; align-items:center; gap:.5rem; background:var(--nt-teal-50); border:1px solid var(--nt-teal-100);
  color:var(--nt-teal-700); border-radius:10px; padding:.6rem .85rem; font-size:.85rem; }

/* ---- Patient picker (seguimiento) ---- */
.nt-patient-item{ display:flex; align-items:center; gap:.6rem; width:100%; padding:.5rem; border-radius:10px;
  border:1px solid transparent; background:none; cursor:pointer; color:var(--nt-ink); }
.nt-patient-item:hover{ background:var(--nt-teal-50); }
.nt-patient-item.active{ background:var(--nt-teal-50); box-shadow:inset 3px 0 0 var(--nt-teal-500); }

/* ---- Foro / thread ---- */
.nt-thread{ flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:.75rem; padding:.25rem .15rem .5rem; min-height:0; }
.nt-msg{ display:flex; }
.nt-msg.mine{ justify-content:flex-end; }
.nt-msg-bubble{ max-width:88%; border:1px solid var(--nt-line); background:#fff; border-radius:14px;
  border-top-left-radius:4px; padding:.7rem .9rem; }
.nt-msg.mine .nt-msg-bubble{ background:var(--nt-teal-50); border-color:var(--nt-teal-100);
  border-top-left-radius:14px; border-top-right-radius:4px; }
.nt-thread-compose{ border-top:1px solid var(--nt-line); padding-top:.85rem; margin-top:.5rem; }
.nt-thread-compose textarea{ resize:none; }

/* ---- Modal ---- */
.nt-modal-backdrop{ position:fixed; inset:0; z-index:1080; background:rgba(13,40,36,.4);
  display:flex; align-items:flex-start; justify-content:center; padding:5vh 1rem; overflow-y:auto; }
.nt-modal{ width:100%; background:#fff; border-radius:18px; box-shadow:0 30px 70px rgba(13,40,36,.28); overflow:hidden; }
.nt-modal-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:1rem;
  padding:1.25rem 1.5rem; border-bottom:1px solid var(--nt-line); }
.nt-modal-x{ border:none; background:var(--nt-teal-50); color:var(--nt-muted); width:34px; height:34px;
  border-radius:10px; font-size:1.4rem; line-height:1; cursor:pointer; flex:0 0 34px; }
.nt-modal-x:hover{ background:var(--nt-teal-100); color:var(--nt-ink); }
.nt-modal-body{ padding:1.5rem; }
.nt-modal-foot{ padding:1rem 1.5rem; border-top:1px solid var(--nt-line); display:flex; justify-content:flex-end; gap:.6rem; }

/* ---- Toast ---- */
.nt-toast{ position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); z-index:1090;
  background:var(--nt-teal-900); color:#fff; border-radius:12px; padding:.8rem 1.2rem; font-weight:700;
  display:flex; align-items:center; gap:.5rem; box-shadow:0 14px 36px rgba(13,40,36,.3); }
.nt-toast svg{ color:#fff; }

/* ---- misc ---- */
.nt-divider{ height:1px; background:var(--nt-line); margin:1.25rem 0; }
.cursor-pointer{ cursor:pointer; }
.nt-chip{ display:inline-flex; align-items:center; gap:.4rem; background:var(--nt-teal-50);
  border:1px solid var(--nt-teal-100); color:var(--nt-teal-700); border-radius:999px;
  padding:.3rem .7rem; font-weight:600; font-size:.82rem; white-space:nowrap; }
.nt-empty{ border:1.5px dashed var(--nt-line); border-radius:14px; padding:2rem; text-align:center; color:var(--nt-muted); }

@media (max-width:991px){
  .nt-sidebar{ position:fixed; left:0; z-index:1050; transform:translateX(-100%); transition:transform .25s; }
  .nt-sidebar.open{ transform:none; }
  .nt-content{ padding:1.1rem; }
}

@media print {
  .nt-sidebar, .nt-topbar, .d-print-none { display: none !important; }
  .nt-content { padding: 0 !important; max-width: 100% !important; }
  body { background: #fff !important; }
  .nt-card { box-shadow: none !important; border: 1px solid #ddd !important; }
}
  </style>
</head>

const NT_MESES = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
const NT_MESES_C = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
const NT_DOW = ["Lu", "Ma", "Mi", "Ju", "Vi", "Sá", "Do"];
function ntISO(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function ntParse(s) {
  if (!s) return null;
  const [y, m, d] = String(s).split("-").map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
}
function ntFmt(s) {
  const d = ntParse(s);
  if (!d) return null;
  return `${d.getDate()} ${NT_MESES_C[d.getMonth()]} ${d.getFullYear()}`;
}

function DatePicker({ value, onChange, showToday = true, placeholder = "Seleccionar fecha" }) {
  const [open, setOpen] = React.useState(false);
  const sel = ntParse(value);
  const [view, setView] = React.useState(() => sel || new Date());
  const ref = React.useRef(null);
  React.useEffect(() => { if (sel) setView(sel); }, [value]);
  React.useEffect(() => {
    function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    if (open) document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [open]);

  const today = new Date();
  const todayISO = ntISO(today);
  const y = view.getFullYear(), m = view.getMonth();
  const startDow = (new Date(y, m, 1).getDay() + 6) % 7;
  const last = new Date(y, m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= last; d++) cells.push(new Date(y, m, d));
  while (cells.length % 7 !== 0) cells.push(null);

  return (
    <div className="nt-dp" ref={ref}>
      <div className="d-flex gap-2">
        <button type="button" className={"nt-dp-trigger form-control d-flex align-items-center justify-content-between" + (open ? " focus" : "")} onClick={() => setOpen((o) => !o)}>
          <span className={sel ? "" : "text-muted-soft"}>{sel ? ntFmt(value) : placeholder}</span>
          <Icon name="cal" size={16} />
        </button>
        {showToday && (
          <button type="button" className="btn btn-soft px-3 text-nowrap d-flex align-items-center gap-1" title="Usar la fecha de hoy" onClick={() => onChange(todayISO)}>
            <Icon name="cal" size={15} /> Hoy
          </button>
        )}
      </div>
      {open && (
        <div className="nt-dp-pop">
          <div className="nt-dp-head">
            <button type="button" className="nt-dp-nav" onClick={() => setView(new Date(y, m - 1, 1))}>‹</button>
            <div className="nt-dp-title">{NT_MESES[m]} {y}</div>
            <button type="button" className="nt-dp-nav" onClick={() => setView(new Date(y, m + 1, 1))}>›</button>
          </div>
          <div className="nt-dp-grid nt-dp-dow">
            {NT_DOW.map((d) => <div key={d} className="nt-dp-dowcell">{d}</div>)}
          </div>
          <div className="nt-dp-grid">
            {cells.map((d, i) => {
              if (!d) return <div key={i} />;
              const iso = ntISO(d);
              const isSel = value === iso, isToday = todayISO === iso;
              return (
                <button type="button" key={i} className={"nt-dp-day" + (isSel ? " sel" : "") + (isToday && !isSel ? " today" : "")}
                  onClick={() => { onChange(iso); setOpen(false); }}>{d.getDate()}</button>
              );
            })}
          </div>
          <div className="nt-dp-foot">
            <button type="button" className="nt-dp-todaybtn" onClick={() => { onChange(todayISO); setView(today); setOpen(false); }}>
              <Icon name="cal" size={14} /> Hoy · {today.getDate()} {NT_MESES_C[today.getMonth()]} {today.getFullYear()}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function Modal({ title, sub, onClose, children, footer, size = "md" }) {
  React.useEffect(() => {
    function onKey(e) { if (e.key === "Escape") onClose(); }
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);
  const maxW = size === "lg" ? 720 : size === "sm" ? 420 : 560;
  return (
    <div className="nt-modal-backdrop" onMouseDown={onClose}>
      <div className="nt-modal" style={{ maxWidth: maxW }} onMouseDown={(e) => e.stopPropagation()}>
        <div className="nt-modal-head">
          <div>
            <h3 className="h5 fw-800 mb-0">{title}</h3>
            {sub && <div className="text-muted-soft" style={{ fontSize: ".88rem" }}>{sub}</div>}
          </div>
          <button className="nt-modal-x" onClick={onClose} aria-label="Cerrar">×</button>
        </div>
        <div className="nt-modal-body">{children}</div>
        {footer && <div className="nt-modal-foot">{footer}</div>}
      </div>
    </div>
  );
}

  const misPacientes = D.pacientes.filter((p) => pacientes.includes(p.id));

  const resultados = clientes.filter((c) => {
    const t = q.trim().toLowerCase();
    if (!t) return false;
    return c.nombre.toLowerCase().includes(t) || c.email.toLowerCase().includes(t);
  });

  function asociar(c) {
    setClientes((prev) => prev.filter((x) => x.id !== c.id));
    setToast(`${c.nombre} fue asociado a tu lista de pacientes`);
    setTimeout(() => setToast(null), 2600);
  }
  function aplicarAsignacion(planId, ini, fin) {
    const plan = D.planById(planId);
    const p = assignFor;
    p.planId = planId;
    p.periodo = `${window.ntFmt(ini)} – ${window.ntFmt(fin)}`;
    p.estado = "Activo";
    setAssignFor(null);
    setToast(`Plan «${plan.nombre}» asignado a ${p.nombre}`);
    setPacientes((x) => [...x]);
    setTimeout(() => setToast(null), 2600);
  }

  return (
    <div className="nt-content">
      {/* Búsqueda y asociación */}
      <div className="nt-card nt-card-pad mb-4">
        <SectionTitle sub="Encuentra un cliente registrado en la plataforma y agrégalo a tu lista de pacientes">Buscar y asociar clientes</SectionTitle>
        <div className="input-group input-group-lg mb-3">
          <span className="input-group-text"><Icon name="search" size={18} /></span>
          <input className="form-control" placeholder="Buscar por nombre o correo… (ej. Sofía o mateo)" value={q} onChange={(e) => setQ(e.target.value)} />
        </div>
        {q.trim() === "" ? (
          <div className="nt-empty">
            <Icon name="users" size={26} />
            <div className="mt-2 fw-700">Escribe para buscar clientes</div>
            <div style={{ fontSize: ".88rem" }}>Solo los clientes que asocies podrán recibir planes y seguimiento tuyos.</div>
          </div>
        ) : resultados.length === 0 ? (
          <div className="nt-empty">No se encontraron clientes para «{q}».</div>
        ) : (
          <div className="row g-2">
            {resultados.map((c) => (
              <div className="col-md-6" key={c.id}>
                <div className="d-flex align-items-center gap-3 p-2 rounded-3" style={{ border: "1px solid var(--nt-line)" }}>
                  <Avatar iniciales={c.iniciales} size={42} />
                  <div className="flex-fill min-w-0">
                    <div className="fw-700 text-truncate">{c.nombre}</div>
                    <div className="text-muted-soft text-truncate" style={{ fontSize: ".8rem" }}>{c.edad} años · {c.pais}</div>
                  </div>
                  <button className="btn btn-primary btn-sm px-3 text-nowrap" onClick={() => asociar(c)}><Icon name="link" size={15} /> Asociar</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Mis pacientes */}
      <div className="d-flex justify-content-between align-items-center mb-3">
        <SectionTitle sub={`${misPacientes.length} pacientes asociados`}>Mis pacientes</SectionTitle>
      </div>
      <div className="row g-3">
        {misPacientes.map((p) => (
          <div className="col-md-6 col-xl-4" key={p.id}>
            <PatientCard p={p} onOpen={onOpenPaciente} onAssign={setAssignFor} />
          </div>
        ))}
      </div>

      {assignFor && <AssignModal paciente={assignFor} onClose={() => setAssignFor(null)} onAssign={aplicarAsignacion} />}
      {toast && (
        <div className="nt-toast"><Icon name="check" size={16} /> {toast}</div>
      )}
    </div>
  );
}

Object.assign(window, { Patients, AssignModal, PatientCard });
  </script>

  <script type="text/babel">
/* ===== planes.jsx ===== */

const MEAL_ICONS = {
  "Desayuno": "flame", "Merienda Mañana": "clock", "Almuerzo": "plate", "Merienda Tarde": "clock", "Cena": "chef",
};

function PlanCard({ plan, onEdit }) {
  const D = window.NT_DATA;
  const total = Math.round(D.totalizarPlan(plan.comidas));
  const items = plan.comidas.reduce((a, c) => a + c.items.length, 0);
  return (
    <div className="nt-card nt-card-pad h-100 d-flex flex-column">
      <div className="d-flex justify-content-between align-items-start mb-2">
        <div>
          <div className="fw-800" style={{ fontSize: "1.15rem" }}>{plan.nombre}</div>
          <div className="text-muted-soft" style={{ fontSize: ".8rem" }}>{plan.autor}</div>
        </div>
        <Pill tone="teal"><Icon name="flame" size={13} /> {total} kcal</Pill>
      </div>
      <div className="d-flex flex-wrap gap-2 my-2">
        {plan.comidas.map((c) => (
          <span key={c.tiempo} className="nt-chip" style={{ fontSize: ".74rem", padding: ".22rem .55rem" }}>
            {c.tiempo} · {Math.round(D.kcalComida(c.items))}
          </span>
        ))}
      </div>
      <div className="nt-divider" style={{ margin: ".5rem 0 .85rem" }}></div>
      <div className="d-flex align-items-center justify-content-between mt-auto">
        <div className="d-flex gap-3 text-muted-soft" style={{ fontSize: ".82rem" }}>
          <span><Icon name="users" size={14} /> {plan.pacientes} pacientes</span>
          <span><Icon name="plate" size={14} /> {items} alimentos</span>
        </div>
        <button className="btn btn-soft btn-sm px-3" onClick={() => onEdit(plan)}><Icon name="edit" size={14} /> Editar</button>
      </div>
    </div>
  );
}

function MealBuilder({ comida, onAdd, onSetPorc, onRemove }) {
  const D = window.NT_DATA;
  const [sel, setSel] = React.useState(D.productos[0].barcode);
  const total = Math.round(D.kcalComida(comida.items));
  const over = total > comida.maxKcal;
  return (
    <div className="nt-meal mb-3">
      <div className="nt-meal-head">
        <div className="d-flex align-items-center gap-2">
          <div className="nt-meal-ico"><Icon name={MEAL_ICONS[comida.tiempo] || "plate"} size={16} /></div>
          <div>
            <div className="fw-700">{comida.tiempo}</div>
            <div className="text-muted-soft" style={{ fontSize: ".78rem" }}>Máx. {comida.maxKcal} kcal · {comida.items.length} alimentos</div>
          </div>
        </div>
        <Pill tone={over ? "red" : "teal"}>{total} / {comida.maxKcal} kcal</Pill>
      </div>
      <div className="p-3">
        {comida.items.length === 0 ? (
          <div className="text-muted-soft text-center py-2" style={{ fontSize: ".85rem" }}>Sin alimentos en este tiempo.</div>
        ) : (
          <div className="d-flex flex-column gap-1 mb-2">
            {comida.items.map((it) => {
              const p = D.byBarcode(it.barcode);
              if (!p) return null;
              return (
                <div key={it.barcode} className="d-flex align-items-center gap-2 py-1">
                  <span className="fw-600 flex-fill text-truncate">{p.desc}</span>
                  <div className="input-group input-group-sm" style={{ width: 92 }}>
                    <input type="number" step="0.5" min="0" className="form-control" value={it.porciones}
                      onChange={(e) => onSetPorc(comida.tiempo, it.barcode, e.target.value)} />
                    <span className="input-group-text">×</span>
                  </div>
                  <span className="text-muted-soft text-end" style={{ width: 64, fontSize: ".85rem" }}>{Math.round(p.energia * it.porciones)} kcal</span>
                  <button className="btn btn-soft btn-sm" onClick={() => onRemove(comida.tiempo, it.barcode)}><Icon name="trash" size={14} /></button>
                </div>
              );
            })}
          </div>
        )}
        <div className="input-group input-group-sm">
          <select className="form-select" value={sel} onChange={(e) => setSel(e.target.value)}>
            {D.productos.map((p) => <option key={p.barcode} value={p.barcode}>{p.desc} ({p.energia} kcal)</option>)}
          </select>
          <button className="btn btn-primary px-3" onClick={() => onAdd(comida.tiempo, sel)}><Icon name="plus" size={14} /> Agregar</button>
        </div>
      </div>
    </div>
  );
}

function PlanEditor({ base, onClose, onSave }) {
  const D = window.NT_DATA;
  const [nombre, setNombre] = React.useState(base ? base.nombre : "");
  const [comidas, setComidas] = React.useState(() =>
    base ? JSON.parse(JSON.stringify(base.comidas))
      : D.tiempos.map((t) => ({ tiempo: t, maxKcal: { "Desayuno": 400, "Merienda Mañana": 200, "Almuerzo": 550, "Merienda Tarde": 200, "Cena": 450 }[t], items: [] }))
  );

  const setComida = (tiempo, fn) => setComidas((prev) => prev.map((c) => c.tiempo === tiempo ? fn(c) : c));
  const onAdd = (tiempo, bc) => setComida(tiempo, (c) => c.items.some((i) => i.barcode === bc) ? c : { ...c, items: [...c.items, { barcode: bc, porciones: 1 }] });
  const onSetPorc = (tiempo, bc, v) => setComida(tiempo, (c) => ({ ...c, items: c.items.map((i) => i.barcode === bc ? { ...i, porciones: parseFloat(v) || 0 } : i) }));
  const onRemove = (tiempo, bc) => setComida(tiempo, (c) => ({ ...c, items: c.items.filter((i) => i.barcode !== bc) }));

  const total = Math.round(D.totalizarPlan(comidas));
  const totalMax = comidas.reduce((a, c) => a + c.maxKcal, 0);

  return (
    <div className="nt-content">
      <button className="btn btn-soft btn-sm mb-3" onClick={onClose}>‹ Volver a planes</button>
      <div className="row g-4">
        <div className="col-lg-8">
          <div className="nt-card nt-card-pad mb-3">
            <label className="form-label">Nombre del plan</label>
            <input className="form-control form-control-lg" value={nombre} onChange={(e) => setNombre(e.target.value)} placeholder="Ej. Plan Pérdida Saludable" />
            <div className="text-muted-soft mt-2" style={{ fontSize: ".82rem" }}>
              Creado por <strong>{D.nutricionista.nombre}</strong>
            </div>
          </div>

          {comidas.map((c) => (
            <MealBuilder key={c.tiempo} comida={c} onAdd={onAdd} onSetPorc={onSetPorc} onRemove={onRemove} />
          ))}
        </div>

        {/* Resumen del plan */}
        <div className="col-lg-4">
          <div style={{ position: "sticky", top: 90 }}>
            <div className="nt-card nt-card-pad mb-3" style={{ background: "var(--nt-teal-50)" }}>
              <div className="text-center mb-3">
                <div className="text-muted-soft fw-700 text-uppercase" style={{ fontSize: ".74rem", letterSpacing: ".05em" }}>Total del plan</div>
                <div className="fw-800 text-teal" style={{ fontSize: "2.4rem", lineHeight: 1 }}>{total}</div>
                <div className="text-muted-soft fw-700">Kcal totales por día</div>
              </div>
              <div className="d-flex flex-column gap-2">
                {comidas.map((c) => {
                  const k = Math.round(D.kcalComida(c.items));
                  const pct = totalMax ? (k / totalMax) * 100 : 0;
                  return (
                    <div key={c.tiempo}>
                      <div className="d-flex justify-content-between" style={{ fontSize: ".82rem" }}>
                        <span className="fw-600">{c.tiempo}</span>
                        <span className="text-muted-soft">{k} kcal</span>
                      </div>
                      <div className="progress mt-1" style={{ height: 7 }}>
                        <div className="progress-bar" style={{ width: Math.min(100, pct) + "%" }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div className="nt-divider" style={{ margin: ".9rem 0" }}></div>
              <div className="d-flex justify-content-between fw-700">
                <span>Meta diaria sugerida</span><span className="text-teal">{totalMax} kcal</span>
              </div>
            </div>
            <button className="btn btn-primary w-100 btn-lg" onClick={() => onSave({ nombre, comidas })} disabled={!nombre.trim()}>
              <Icon name="check" size={18} /> Guardar plan
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Plans() {
  const D = window.NT_DATA;
  const [planes, setPlanes] = React.useState(() => D.planes.map((p) => ({ ...p })));
  const [editing, setEditing] = React.useState(null); // null | "new" | plan
  const [toast, setToast] = React.useState(null);

  function guardar({ nombre, comidas }) {
    if (editing === "new") {
      const nuevo = { id: "pl" + (planes.length + 1), nombre, autor: D.nutricionista.nombre, pacientes: 0, comidas };
      setPlanes((p) => [nuevo, ...p]);
      D.planes.unshift(nuevo);
    } else {
      setPlanes((p) => p.map((x) => x.id === editing.id ? { ...x, nombre, comidas } : x));
      const idx = D.planes.findIndex((x) => x.id === editing.id);
      if (idx >= 0) D.planes[idx] = { ...D.planes[idx], nombre, comidas };
    }
    setEditing(null);
    setToast("Plan guardado correctamente");
    setTimeout(() => setToast(null), 2600);
  }

  if (editing) {
    return <PlanEditor base={editing === "new" ? null : editing} onClose={() => setEditing(null)} onSave={guardar} />;
  }

  return (
    <div className="nt-content">
      <div className="d-flex justify-content-between align-items-center mb-3">
        <SectionTitle sub="Cada plan se compone de 5 tiempos de comida y totaliza las calorías">Planes de alimentación</SectionTitle>
        <button className="btn btn-primary" onClick={() => setEditing("new")}><Icon name="plus" size={16} /> Nuevo plan</button>
      </div>
      <div className="row g-3">
        {planes.map((p) => (
          <div className="col-md-6" key={p.id}>
            <PlanCard plan={p} onEdit={setEditing} />
          </div>
        ))}
      </div>
      {toast && <div className="nt-toast"><Icon name="check" size={16} /> {toast}</div>}
    </div>
  );
}

Object.assign(window, { Plans, PlanEditor, PlanCard, MealBuilder });
  </script>

  <script type="text/babel">
/* ===== seguimiento.jsx ===== */

const SEG_MEAL_ICONS = {
  "Desayuno": "flame", "Merienda Mañana": "clock", "Almuerzo": "plate", "Merienda Tarde": "clock", "Cena": "chef",

// Selector lateral de pacientes
function PatientPicker({ pacientes, sel, onSel }) {

    <div className="nt-card nt-card-pad">
      <div className="fw-700 mb-2">Mis pacientes</div>
      <div className="d-flex flex-column gap-1">
        {pacientes.map((p) => (
          <button key={p.id} className={"nt-patient-item" + (sel === p.id ? " active" : "")} onClick={() => onSel(p.id)}>
            <Avatar iniciales={p.iniciales} size={36} />
            <div className="flex-fill min-w-0 text-start">
              <div className="fw-700 text-truncate" style={{ fontSize: ".88rem" }}>{p.nombre}</div>
              <div className="text-truncate text-muted-soft" style={{ fontSize: ".76rem" }}>{p.planId ? window.NT_DATA.planById(p.planId).nombre : "Sin plan"}</div>
            </div>
          </button>
        ))}
      </div>
    </div>

}

// Registro diario del paciente (lectura)
function PatientLog({ p }) {
  const D = window.NT_DATA;
  const plan = p.planId ? D.planById(p.planId) : null;
  const total = Object.values(p.registro).reduce((a, arr) => a + arr.reduce((s, i) => s + i.kcal, 0), 0);
  const meta = p.metaCalorias;

  return (
    <div className="nt-card nt-card-pad">
      <div className="d-flex justify-content-between align-items-start mb-3">
        <SectionTitle sub={plan ? `Plan: ${plan.nombre} · ${p.periodo}` : "Sin plan asignado"}>Registro diario · {window.ntFmt(p.ultimoRegistro)}</SectionTitle>
        <Pill tone={total > meta ? "red" : "teal"}>{total} / {meta} kcal</Pill>
      </div>
      <div className="progress mb-3">
        <div className={"progress-bar" + (total > meta ? " over" : "")} style={{ width: Math.min(100, (total / meta) * 100) + "%" }}></div>
      </div>
      <div className="d-flex flex-column gap-2">
        {D.tiempos.map((t) => {
          const items = p.registro[t] || [];
          const planComida = plan ? plan.comidas.find((c) => c.tiempo === t) : null;
          const sum = items.reduce((a, i) => a + i.kcal, 0);
          const max = planComida ? planComida.maxKcal : null;
          return (
            <div className="nt-meal" key={t}>
              <div className="nt-meal-head">
                <div className="d-flex align-items-center gap-2">
                  <div className="nt-meal-ico"><Icon name={SEG_MEAL_ICONS[t]} size={15} /></div>
                  <div>
                    <div className="fw-700">{t}</div>
                    <div className="text-muted-soft" style={{ fontSize: ".76rem" }}>{max ? `Máx. ${max} kcal` : "Sin meta"} · {items.length} alimentos</div>
                  </div>
                </div>
                <Pill tone={max && sum > max ? "red" : "gray"}>{sum} kcal</Pill>
              </div>
              {items.length > 0 && (
                <div>
                  {items.map((it, i) => (
                    <div className="nt-food-row" key={i}>
                      <div className="d-flex align-items-center gap-2">
                        <span className="text-muted-soft" style={{ fontSize: ".85rem" }}>{it.porciones}×</span>
                        <span className="fw-600">{it.desc}</span>
                      </div>
                      <span className="text-muted-soft">{it.kcal} kcal</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Gráfica de avance de medidas
function LineChart({ data, keyName, color }) {
  const w = 640, h = 200, pad = 30;
  if (data.length < 2) return <div className="nt-empty">Se requieren al menos 2 registros de medidas para graficar.</div>;
  const vals = data.map((d) => d[keyName]);
  const min = Math.min(...vals), max = Math.max(...vals);
  const rng = (max - min) || 1;
  const x = (i) => pad + (i * (w - pad * 2)) / (data.length - 1);
  const y = (v) => h - pad - ((v - min) / rng) * (h - pad * 2);
  const pts = data.map((d, i) => `${x(i)},${y(d[keyName])}`).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: "auto" }}>
      {[0, .5, 1].map((t, i) => <line key={i} x1={pad} x2={w - pad} y1={pad + t * (h - pad * 2)} y2={pad + t * (h - pad * 2)} stroke="var(--nt-line)" strokeWidth="1" />)}
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      {data.map((d, i) => <circle key={i} cx={x(i)} cy={y(d[keyName])} r="3.5" fill="#fff" stroke={color} strokeWidth="2" />)}
    </svg>
  );
}

// Avance del paciente: medidas + gráfica + reporte PDF
function PatientProgress({ p }) {
  const medidas = [...(p.medidas || [])].sort((a, b) => a.fecha.localeCompare(b.fecha));
  const [metric, setMetric] = React.useState("peso");
  const metrics = [
    { k: "peso", l: "Peso", u: "kg" }, { k: "cintura", l: "Cintura", u: "cm" },
    { k: "caderas", l: "Caderas", u: "cm" }, { k: "musculo", l: "% Músculo", u: "%" }, { k: "grasa", l: "% Grasa", u: "%" },
  ];
  const mm = metrics.find((x) => x.k === metric);

  return (
    <div>
      <div className="d-flex flex-wrap gap-2 mb-3 d-print-none align-items-center justify-content-between">
        <div className="d-flex flex-wrap gap-2">
          {metrics.map((m) => (
            <button key={m.k} className={"btn btn-sm " + (metric === m.k ? "btn-primary" : "btn-soft")} onClick={() => setMetric(m.k)}>{m.l}</button>
          ))}
        </div>
        <button className="btn btn-primary btn-sm" onClick={() => window.print()}><Icon name="pdf" size={15} /> Generar PDF</button>
      </div>

      <div className="nt-card nt-card-pad" id="avance-print">
        <div className="d-flex justify-content-between align-items-start mb-4">
          <div>
            <h2 className="fw-800 mb-1">Reporte de Avance</h2>
            <div className="text-muted-soft">{p.nombre} · {medidas.length} registros de medidas</div>
          </div>
          <div className="nt-brand-name" style={{ color: "var(--nt-teal-700)" }}>Nutri<span>TEC</span></div>
        </div>
        <div className="mb-4">
          <div className="fw-700 mb-2">{mm.l} ({mm.u})</div>
          <LineChart data={medidas} keyName={metric} color="var(--nt-teal-600)" />
        </div>
        <div className="table-responsive">
          <table className="table table-striped align-middle mb-0">
            <thead><tr><th>Fecha</th><th>Peso</th><th>Cintura</th><th>Cuello</th><th>Caderas</th><th>% Músculo</th><th>% Grasa</th></tr></thead>
            <tbody>
              {medidas.map((m, i) => (
                <tr key={i}>
                  <td className="fw-700">{window.ntFmt(m.fecha)}</td><td>{m.peso} kg</td><td>{m.cintura} cm</td>
                  <td>{m.cuello} cm</td><td>{m.caderas} cm</td><td>{m.musculo}%</td><td>{m.grasa}%</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {medidas.length === 0 && <div className="nt-empty">El paciente aún no ha registrado medidas.</div>}
      </div>
    </div>
  );
}

// Hilo de retroalimentación (foro · MongoDB)
function FeedbackThread({ p, hilo, onSend }) {
  const [texto, setTexto] = React.useState("");
  const endRef = React.useRef(null);
  React.useEffect(() => { if (endRef.current) endRef.current.scrollTop = endRef.current.scrollHeight; }, [hilo.length, p.id]);

  function enviar(e) {
    e.preventDefault();
    if (!texto.trim()) return;
    onSend(texto.trim());
    setTexto("");
  }

  return (
    <div className="nt-card nt-card-pad d-flex flex-column" style={{ height: "calc(100vh - 230px)", minHeight: 480 }}>
      <div className="d-flex align-items-center justify-content-between mb-1">
        <SectionTitle sub="Foro de retroalimentación · se guarda en MongoDB">Retroalimentación</SectionTitle>
        <Pill tone="teal"><Icon name="chat" size={13} /> {hilo.length}</Pill>
      </div>

      <div className="nt-thread" ref={endRef}>
        {hilo.length === 0 && <div className="nt-empty">Aún no hay retroalimentación para {p.nombre.split(" ")[0]}.</div>}
        {hilo.map((m, i) => {
          const mine = m.autor === "nutri";
          return (
            <div key={i} className={"nt-msg" + (mine ? " mine" : "")}>
              <div className="nt-msg-bubble">
                <div className="d-flex align-items-center justify-content-between gap-3 mb-1">
                  <span className="fw-700" style={{ fontSize: ".82rem" }}>{mine ? "Tú" : m.nombre}</span>
                  <span style={{ fontSize: ".72rem", opacity: .7 }}>{window.ntFmt(m.fecha)}</span>
                </div>
                <div style={{ fontSize: ".9rem", lineHeight: 1.5 }}>{m.texto}</div>
              </div>
            </div>
          );
        })}
      </div>

      <form onSubmit={enviar} className="nt-thread-compose">
        <textarea className="form-control" rows={2} placeholder={`Escribe retroalimentación para ${p.nombre.split(" ")[0]}…`}
          value={texto} onChange={(e) => setTexto(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) enviar(e); }} />
        <div className="d-flex justify-content-between align-items-center mt-2">
          <span className="text-muted-soft" style={{ fontSize: ".76rem" }}>Campo de prosa libre, sin límite de extensión.</span>
          <button type="submit" className="btn btn-primary px-3" disabled={!texto.trim()}><Icon name="send" size={15} /> Enviar</button>
        </div>
      </form>
    </div>
  );
}

// Selector: registro diario / avance / retroalimentación (una vista a la vez)
function SegToggle({ vista, onVista }) {
  const opts = [
    { key: "registro", label: "Registro diario", icon: "plate" },
    { key: "avance", label: "Avance", icon: "chart" },
    { key: "feedback", label: "Retroalimentación", icon: "chat" },
  ];
  return (
    <div className="nt-seg mb-3 d-print-none">
      {opts.map((o) => (
        <button key={o.key} type="button"
          className={vista === o.key ? "on" : ""}
          onClick={() => onVista(o.key)}>
          <Icon name={o.icon} size={16} /> {o.label}
        </button>
      ))}
    </div>
  );
}

function Followup({ initialPaciente }) {
  const D = window.NT_DATA;
  const pacientes = D.pacientes;
  const [sel, setSel] = React.useState(initialPaciente || pacientes[0].id);
  const [foro, setForo] = React.useState(() => JSON.parse(JSON.stringify(D.foro)));
  const [vista, setVista] = React.useState("registro");

  React.useEffect(() => { if (initialPaciente) setSel(initialPaciente); }, [initialPaciente]);

  const p = pacientes.find((x) => x.id === sel);
  const hilo = foro[sel] || [];

  function enviar(texto) {
    const msg = { autor: "nutri", nombre: D.nutricionista.corto, fecha: "2026-06-06", texto };
    setForo((prev) => ({ ...prev, [sel]: [...(prev[sel] || []), msg] }));
  }

  return (
    <div className="nt-content">
      <div className="row g-4">
        <div className="col-lg-3 d-print-none">
          <div style={{ position: "sticky", top: 90 }}>
            <PatientPicker pacientes={pacientes} sel={sel} onSel={setSel} />
            <div className="nt-card nt-card-pad mt-3">
              <div className="d-flex align-items-center gap-2 mb-2">
                <Avatar iniciales={p.iniciales} size={42} />
                <div className="min-w-0">
                  <div className="fw-700 text-truncate">{p.nombre}</div>
                  <div className="text-muted-soft text-truncate" style={{ fontSize: ".78rem" }}>{p.email}</div>
                </div>
              </div>
              <div className="row g-2 text-center mt-1">
                {[["Peso", p.peso + " kg"], ["IMC", p.imc], ["% Grasa", p.grasa + "%"], ["% Músc.", p.musculo + "%"]].map((m, i) => (
                  <div className="col-6" key={i}>
                    <div className="p-2 rounded-3" style={{ background: "var(--nt-teal-50)" }}>
                      <div className="fw-800" style={{ fontSize: ".95rem" }}>{m[1]}</div>
                      <div className="text-muted-soft" style={{ fontSize: ".72rem" }}>{m[0]}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
        <div className="col-lg-9">
          <SegToggle vista={vista} onVista={setVista} />
          {vista === "registro" && <PatientLog p={p} />}
          {vista === "avance" && <PatientProgress p={p} />}
          {vista === "feedback" && <FeedbackThread p={p} hilo={hilo} onSend={enviar} />}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { Followup, PatientLog, PatientProgress, FeedbackThread, PatientPicker, LineChart });
  </script>

  <script type="text/babel">
/* ===== productos.jsx ===== */

function Products() {
  const D = window.NT_DATA;
  const [mios, setMios] = React.useState(() => [...D.misProductos]);
  const [open, setOpen] = React.useState(false);
  const [editIdx, setEditIdx] = React.useState(null);
  const [q, setQ] = React.useState("");
  const blank = { barcode: "", desc: "", porcion: "", unidad: "g", energia: "", grasa: "", sodio: "", carbs: "", proteina: "", vitaminas: "", calcio: "", hierro: "" };
  const [f, setF] = React.useState(blank);
  const campos = [
    { k: "energia", l: "Energía", u: "Kcal" }, { k: "grasa", l: "Grasa", u: "g" }, { k: "sodio", l: "Sodio", u: "mg" },
    { k: "carbs", l: "Carbohidratos", u: "g" }, { k: "proteina", l: "Proteína", u: "g" },
    { k: "calcio", l: "Calcio", u: "mg" }, { k: "hierro", l: "Hierro", u: "mg" },
  ];
  function abrirNuevo() { setF(blank); setEditIdx(null); setOpen(true); }
  function editar(i) { setF({ ...mios[i] }); setEditIdx(i); setOpen(true); }
  function eliminar(i) { setMios((m) => m.filter((_, idx) => idx !== i)); }
  function guardar(e) {
    e.preventDefault();
    if (editIdx !== null) {
      setMios((m) => m.map((p, idx) => idx === editIdx ? { ...f, estado: "Pendiente" } : p));
    } else {
      setMios((m) => [{ ...f, estado: "Pendiente" }, ...m]);
    }
    setF(blank); setOpen(false); setEditIdx(null);
  }
  const catalogo = D.productos.filter((p) => {
    const t = q.trim().toLowerCase();
    if (!t) return true;
    return p.desc.toLowerCase().includes(t) || p.barcode.includes(t);
  });

  return (
    <div className="nt-content">
      <div className="d-flex justify-content-between align-items-center mb-3">
        <SectionTitle sub="Los productos nuevos quedan en espera de aprobación del administrador antes de estar disponibles para la comunidad">Mis productos</SectionTitle>
        <button className="btn btn-primary" onClick={open ? () => setOpen(false) : abrirNuevo}><Icon name="plus" size={16} /> Nuevo producto</button>
      </div>

      {open && (
        <div className="nt-card nt-card-pad mb-4">
          <h3 className="h6 fw-800 mb-3">{editIdx !== null ? "Editar producto" : "Agregar producto / platillo"}</h3>
          <form onSubmit={guardar}>
            <div className="row">
              <div className="mb-3 col-md-4">
                <label className="form-label">Código de barras</label>
                <div className="input-group"><span className="input-group-text"><Icon name="barcode" size={16} /></span>
                  <input className="form-control" required value={f.barcode} onChange={(e) => setF({ ...f, barcode: e.target.value })} placeholder="7441…" /></div>
              </div>
              <div className="mb-3 col-md-5">
                <label className="form-label">Descripción</label>
                <input className="form-control" required value={f.desc} onChange={(e) => setF({ ...f, desc: e.target.value })} placeholder="Nombre del producto" />
              </div>
              <div className="mb-3 col-md-3">
                <label className="form-label">Tamaño de porción</label>
                <div className="input-group">
                  <input type="number" className="form-control" value={f.porcion} onChange={(e) => setF({ ...f, porcion: e.target.value })} placeholder="100" />
                  <select className="form-select" style={{ maxWidth: 80 }} value={f.unidad} onChange={(e) => setF({ ...f, unidad: e.target.value })}><option>g</option><option>ml</option></select>
                </div>
              </div>
              {campos.map((c) => (
                <div className="mb-3 col-6 col-md-3" key={c.k}>
                  <label className="form-label">{c.l}</label>
                  <div className="input-group">
                    <input type="number" step="0.1" className="form-control" value={f[c.k]} onChange={(e) => setF({ ...f, [c.k]: e.target.value })} placeholder="0" />
                    <span className="input-group-text">{c.u}</span>
                  </div>
                </div>
              ))}
              <div className="mb-3 col-md-6">
                <label className="form-label">Vitaminas</label>
                <input className="form-control" value={f.vitaminas} onChange={(e) => setF({ ...f, vitaminas: e.target.value })} placeholder="Ej. A, C, B12" />
              </div>
            </div>
            <div className="d-flex gap-2">
              <button type="submit" className="btn btn-primary px-4">{editIdx !== null ? "Guardar cambios" : "Enviar para aprobación"}</button>
              <button type="button" className="btn btn-soft" onClick={() => { setOpen(false); setEditIdx(null); }}>Cancelar</button>
            </div>
          </form>
        </div>
      )}

      <div className="nt-card nt-card-pad mb-4">
        <div className="table-responsive">
          <table className="table align-middle mb-0">
            <thead><tr><th>Producto</th><th>Código</th><th>Porción</th><th>Energía</th><th>Estado</th><th></th></tr></thead>
            <tbody>
              {mios.map((p, i) => (
                <tr key={i}>
                  <td className="fw-700">{p.desc}<div className="text-muted-soft fw-normal" style={{ fontSize: ".78rem" }}>{p.vitaminas && "Vit. " + p.vitaminas}</div></td>
                  <td>{p.barcode}</td>
                  <td>{p.porcion}{p.unidad}</td>
                  <td>{p.energia} kcal</td>
                  <td><Pill tone={p.estado === "Aprobado" ? "teal" : "gray"}>{p.estado === "Aprobado" ? <Icon name="check" size={13} /> : <Icon name="clock" size={13} />} {p.estado}</Pill></td>
                  <td className="text-end">
                    <div className="d-flex gap-1 justify-content-end">
                      <button className="btn btn-soft btn-sm px-2 py-1" title="Editar" onClick={() => editar(i)}><Icon name="edit" size={14} /></button>
                      <button className="btn btn-soft btn-sm px-2 py-1" title="Eliminar" onClick={() => eliminar(i)}><Icon name="trash" size={14} /></button>
                    </div>
                  </td>
                </tr>
              ))}
              {mios.length === 0 && <tr><td colSpan="6"><div className="nt-empty">No has agregado productos.</div></td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      <SectionTitle sub="Productos aprobados disponibles para construir planes y para toda la comunidad">Catálogo aprobado</SectionTitle>
      <div className="nt-card nt-card-pad">
        <div className="input-group mb-3" style={{ maxWidth: 360 }}>
          <span className="input-group-text"><Icon name="search" size={16} /></span>
          <input className="form-control" placeholder="Buscar por nombre o código" value={q} onChange={(e) => setQ(e.target.value)} />
        </div>
        <div className="table-responsive">
          <table className="table align-middle mb-0">
            <thead><tr><th>Producto</th><th>Código</th><th>Porción</th><th>Energía</th><th>Carbs</th><th>Proteína</th><th>Grasa</th></tr></thead>
            <tbody>
              {catalogo.map((p) => (
                <tr key={p.barcode}>
                  <td className="fw-700">{p.desc}</td>
                  <td>{p.barcode}</td>
                  <td>{p.porcion}{p.unidad}</td>
                  <td>{p.energia} kcal</td>
                  <td>{p.carbs} g</td><td>{p.proteina} g</td><td>{p.grasa} g</td>
                </tr>
              ))}
              {catalogo.length === 0 && <tr><td colSpan="7"><div className="nt-empty">Sin coincidencias.</div></td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { Products });
  </script>

  <script type="text/babel">
/* ===== app.jsx ===== */

const TITLES = {
  pacientes: ["Pacientes", "Busca, asocia y gestiona a tus pacientes"],
  planes: ["Planes de alimentación", "Crea y administra planes de 5 tiempos de comida"],
  seguimiento: ["Seguimiento", "Revisa el registro diario, el avance y da retroalimentación"],
  productos: ["Gestión de productos", "Agrega productos / platillos a la comunidad"],
};

function App() {
  const [view, setView] = React.useState("login"); // login | register | app
  const [screen, setScreen] = React.useState("pacientes");
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [pacienteSel, setPacienteSel] = React.useState(null);

  if (view === "login") return <Login onLogin={() => { setScreen("pacientes"); setView("app"); }} onGoRegister={() => setView("register")} />;
  if (view === "register") return <Register onDone={() => { setScreen("pacientes"); setView("app"); }} onGoLogin={() => setView("login")} />;

  const nav = (k) => { setScreen(k); setMenuOpen(false); };
  const abrirPaciente = (id) => { setPacienteSel(id); setScreen("seguimiento"); setMenuOpen(false); };
  const [title, sub] = TITLES[screen];

  let body = null;
  if (screen === "pacientes") body = <Patients onOpenPaciente={abrirPaciente} />;
  else if (screen === "planes") body = <Plans />;
  else if (screen === "seguimiento") body = <Followup initialPaciente={pacienteSel} />;
  else if (screen === "productos") body = <Products />;

  return (
    <div className="nt-app">
      <Sidebar current={screen} onNav={nav} onLogout={() => setView("login")} open={menuOpen} />
      {menuOpen && <div className="position-fixed top-0 start-0 w-100 h-100 d-lg-none" style={{ background: "rgba(0,0,0,.3)", zIndex: 1040 }} onClick={() => setMenuOpen(false)}></div>}
      <main className="nt-main">
        <TopBar title={title} subtitle={sub} onMenu={() => setMenuOpen(true)} />
        {body}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
